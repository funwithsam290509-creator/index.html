<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: black;
    color: white;
    overflow: hidden;
}

/* Sections */
.section {
    position: absolute;
    width: 100%;
    height: 100vh;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
}

.section.active {
    display: flex;
}

/* Background */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
    filter: brightness(0.4);
}

/* Text */
h1 {
    font-size: 2.8rem;
    margin-bottom: 20px;
}

/* Next button */
.next {
    margin-top: 20px;
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    background: #ff4081;
    color: white;
    cursor: pointer;
}

/* Button container */
.button-container {
    display: flex;
    gap: 40px;
    margin-top: 30px;
}

/* PREMIUM BUTTONS */
#yesBtn, #noBtn {
    position: relative;
    overflow: hidden;
    padding: 20px 55px;
    font-size: 24px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
}

/* YES BUTTON */
#yesBtn {
    background: linear-gradient(135deg, #ff4081, #ff80ab);
    color: white;
    box-shadow: 0 0 20px rgba(255, 64, 129, 0.7);
    animation: pulseGlow 1.5s infinite;
}

#yesBtn:hover {
    transform: scale(1.12);
    box-shadow: 0 0 40px rgba(255, 64, 129, 1);
}

/* NO BUTTON */
#noBtn {
    background: #222;
    color: white;
    box-shadow: 0 0 15px rgba(255,255,255,0.1);
}

#noBtn:hover {
    transform: scale(1.1);
    background: #444;
}

/* Pulse animation */
@keyframes pulseGlow {
    0% { box-shadow: 0 0 15px rgba(255,64,129,0.6); }
    50% { box-shadow: 0 0 35px rgba(255,64,129,1); }
    100% { box-shadow: 0 0 15px rgba(255,64,129,0.6); }
}

/* Ripple */
.ripple {
    position: absolute;
    border-radius: 50%;
    transform: scale(0);
    animation: rippleEffect 0.6s linear;
    background: rgba(255, 255, 255, 0.6);
}

@keyframes rippleEffect {
    to {
        transform: scale(4);
        opacity: 0;
    }
}

/* Heartbeat animation */
@keyframes heartbeat {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.15); }
}

#yesBtn.heart {
    animation: heartbeat 0.6s infinite;
}

/* Cake */
.cake {
    font-size: 130px;
}

/* Confetti */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    top: 0;
    border-radius: 50%;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}

/* Cursor glow */
.cursor {
    position: fixed;
    width: 15px;
    height: 15px;
    background: rgba(255,64,129,0.7);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
}
</style>

</head>
<body>

<div class="cursor" id="cursor"></div>

<div class="section active" id="s1">
    <img src="one.jpeg" class="bg">
    <h1>🎉 Congratulations our homeroom teacher ! ❤️❤️</h1>
    <button class="next">Next</button>
</div>

<div class="section" id="s2">
    <img src="two.jpeg" class="bg">
    <h1>Your hard work paid off 💖</h1>
    <button class="next">Next</button>
</div>

<div class="section" id="s3">
    <img src="three.jpeg" class="bg">
    <h1>We are so proud of you 🌟 no matter what ever it is ❤️❤️🫶🫶. we believe in u more than u believe in yourself 🫶🫶🫶</h1>
    <button class="next">Next</button>
</div>

<div class="section" id="s4">
    <h1>Do you deserve this? 🤔</h1>

    <div class="button-container">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 😅</button>
    </div>
</div>

<div class="section" id="s5">
    <div class="cake">🎂</div>
    <h1 id="finalText"></h1>
</div>

<script>
let current = 1;

function showSection(n) {
    document.querySelectorAll(".section").forEach(sec => sec.classList.remove("active"));
    document.getElementById("s" + n).classList.add("active");
}

document.querySelectorAll(".next").forEach(btn => {
    btn.addEventListener("click", () => {
        current++;
        showSection(current);
    });
});

let yesScale = 1;
let noScale = 1;

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

/* YES */
yesBtn.addEventListener("click", () => {
    yesBtn.classList.add("heart");
    goFinal("Of course you do! 💖 .this is your big moment and it is needed to be celebrated 🫶🫶🎉🎉🥳🥳🎊🎊");
});

/* NO */
noBtn.addEventListener("mouseover", () => {

    noBtn.style.position = "absolute";

    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    noScale -= 0.1;
    if (noScale < 0.4) noScale = 0.4;
    noBtn.style.transform = `scale(${noScale})`;

    yesScale += 0.2;  // enhanced growth
    yesBtn.style.transform = `scale(${yesScale})`;
});

noBtn.addEventListener("click", () => {
    goFinal("You DO deserve it ❤️");
});

/* Ripple effect */
function addRipple(button) {
    button.addEventListener("click", function (e) {
        const circle = document.createElement("span");
        const diameter = Math.max(button.clientWidth, button.clientHeight);
        const radius = diameter / 2;

        circle.style.width = circle.style.height = diameter + "px";
        circle.style.left = e.clientX - button.offsetLeft - radius + "px";
        circle.style.top = e.clientY - button.offsetTop - radius + "px";
        circle.classList.add("ripple");

        const ripple = button.getElementsByClassName("ripple")[0];
        if (ripple) ripple.remove();

        button.appendChild(circle);
    });
}

addRipple(yesBtn);
addRipple(noBtn);

/* Final */
function goFinal(text) {
    current = 5;
    showSection(5);
    document.getElementById("finalText").innerText = text;
    fireworks();
}

/* Fireworks */
function fireworks() {
    for (let i = 0; i < 100; i++) {
        let c = document.createElement("div");
        c.className = "confetti";

        c.style.left = Math.random() * 100 + "vw";
        c.style.background = randomColor();
        c.style.animationDuration = (Math.random() * 2 + 2) + "s";

        document.body.appendChild(c);
    }
}

function randomColor() {
    const colors = ["#ff4081", "#7c4dff", "#00e676", "#ffea00", "#00bcd4"];
    return colors[Math.floor(Math.random() * colors.length)];
}

/* Cursor glow */
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", (e) => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
});
</script>

</body>
</html>
